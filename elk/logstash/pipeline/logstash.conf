input {
  # Existing: Filebeat / Beats input
  beats {
    port => 5044
  }

  # NEW: Suricata eve.json input
  file {
   path => "/var/log/suricata/eve.json"
   start_position => "beginning"
   sincedb_path => "/usr/share/logstash/data/sincedb-suricata"
   codec => plain { charset => "UTF-8" }
   tags => ["suricata"]
  }
}

filter {
  #############################################
  # Existing pipeline: docker SECLOG parsing
  #############################################
  if [log_source] == "docker" and [log] =~ /\[function:SECLOG\]/ {

    grok {
      match => { "log" => "%{GREEDYDATA:prefix}\[function:SECLOG\] %{GREEDYDATA:secjson}" }
    }

    json {
      source => "secjson"
      target => "sec"
    }

    if [sec][payload] {
      json {
        source => "[sec][payload]"
        target => "[sec][payload_obj]"
      }
    }
  }

  #############################################
  # NEW pipeline: Suricata normalization
  #############################################
  if "suricata" in [tags] {
	  # Remove leading NULL bytes that break JSON parsing
	  mutate {
	    gsub => ["message", "^\u0000+", ""]
	  }

	  # Now parse JSON from message
	  json {
	    source => "message"
	  }

	  # Set @timestamp from Suricata timestamp
	  if [timestamp] {
	    date {
	      match => ["timestamp", "ISO8601"]
	      target => "@timestamp"
	    }
	  }

	  mutate {
	    add_field => {
	      "[event][module]" => "suricata"
	      "[event][dataset]" => "suricata.eve"
	    }
	  }
   }
}

output {
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]

    # Split indices, Suricata vs everything else
    index => "%{[@metadata][index]}"
  }

  stdout { codec => rubydebug }
}

# Set index name cleanly using metadata
filter {
  if "suricata" in [tags] {
    mutate { add_field => { "[@metadata][index]" => "suricata-eve-%{+YYYY.MM.dd}" } }
  } else {
    mutate { add_field => { "[@metadata][index]" => "lab-beats-%{+YYYY.MM.dd}" } }
  }
}
