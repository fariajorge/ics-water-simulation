input {
  beats { port => 5044 }
}

output {
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    index => "lab-beats-%{+YYYY.MM.dd}"
  }
  stdout { codec => rubydebug }
}

filter {
  # Only touch docker logs that include SECLOG
  if [log_source] == "docker" and [log] =~ /\[function:SECLOG\]/ {

    # Extract the JSON blob that comes after "[function:SECLOG] "
    grok {
      match => { "log" => "%{GREEDYDATA:prefix}\[function:SECLOG\] %{GREEDYDATA:secjson}" }
    }

    # Parse JSON into a structured object under "sec"
    json {
      source => "secjson"
      target => "sec"
    }

    # Parse nested JSON payload string (optional but useful)
    if [sec][payload] {
      json {
        source => "[sec][payload]"
        target => "[sec][payload_obj]"
      }
    }
  }
}
