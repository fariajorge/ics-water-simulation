input {
  # Existing: Filebeat / Beats input
  beats {
    port => 5044
  }
  # Suricata eve.json input
  file {
    path => "/var/log/suricata/eve.json"
    start_position => "beginning"
    sincedb_path => "/usr/share/logstash/data/sincedb-suricata"
    codec => plain { charset => "UTF-8" }
    tags => ["suricata"]
  }
}

filter {
  #############################################
  # Existing pipeline: docker SECLOG parsing
  #############################################
  if [log_source] == "docker" and [log] =~ /\[function:SECLOG\]/ {
    grok {
      match => { "log" => "%{GREEDYDATA:prefix}\[function:SECLOG\] %{GREEDYDATA:secjson}" }
    }
    json {
      source => "secjson"
      target => "sec"
    }
    if [sec][payload] {
      json {
        source => "[sec][payload]"
        target => "[sec][payload_obj]"
      }
    }
  }

  #############################################
  # Suricata pipeline
  #############################################
  if "suricata" in [tags] {
    # Remove leading NULL bytes that break JSON parsing
    mutate {
      gsub => ["message", "^\u0000+", ""]
    }
    # Parse JSON from message
    json {
      source => "message"
    }
    # Set @timestamp from Suricata timestamp
    if [timestamp] {
      date {
        match => ["timestamp", "ISO8601"]
        target => "@timestamp"
      }
    }
    # Add metadata and route to suricata index
    mutate {
      add_field => {
        "[event][module]" => "suricata"
        "[event][dataset]" => "suricata.eve"
        "[@metadata][index]" => "suricata-eve-%{+YYYY.MM.dd}"
      }
    }
  } else {
    # All other logs (lab beats) go to lab index
    mutate {
      add_field => { "[@metadata][index]" => "lab-beats-%{+YYYY.MM.dd}" }
    }
  }
}

output {
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    index => "%{[@metadata][index]}"
  }
  stdout { codec => rubydebug }
}
