name: ics-water-simulation

services:
  tank-sim:
    build: ./tank-sim/app
    container_name: tank-sim
    restart: unless-stopped
    networks:
      ot_hmi_net:
        ipv4_address: 10.10.10.60
    # ports:
    #   - "5000:5000"

  revpi-twin:
    image: nodered/node-red:latest
    container_name: revpi-twin
    restart: unless-stopped
    networks:
      ot_hmi_net:
        ipv4_address: 10.10.10.52
      rm_net:
        ipv4_address: 10.10.20.5
    volumes:
      - ./revpi-twin/data:/data

  hmi:
    image: nginx:alpine
    container_name: hmi
    restart: unless-stopped
    depends_on:
      - revpi-twin
    networks:
      ot_hmi_net:
        ipv4_address: 10.10.10.56
    ports:
      - "8080:80"
    volumes:
      - ./hmi/nginx.conf:/etc/nginx/nginx.conf:ro

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.3
    container_name: nuc-elasticsearch
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms1g -Xmx1g
    volumes:
      - esdata:/usr/share/elasticsearch/data
    networks:
      rm_net:
        ipv4_address: 10.10.20.10
    ports:
      - "9200:9200"

  kibana:
    image: docker.elastic.co/kibana/kibana:8.15.3
    container_name: nuc-kibana
    restart: unless-stopped
    depends_on:
      - elasticsearch
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - XPACK_ENCRYPTEDSAVEDOBJECTS_ENCRYPTIONKEY=${KIBANA_ENCRYPTION_KEY}
      - XPACK_REPORTING_ENCRYPTIONKEY=${KIBANA_REPORTING_KEY}
      - XPACK_SECURITY_ENCRYPTIONKEY=${KIBANA_SECURITY_KEY}
    networks:
      rm_net:
        ipv4_address: 10.10.20.11
    ports:
      - "5601:5601"

  logstash:
    image: docker.elastic.co/logstash/logstash:8.15.3
    container_name: nuc-logstash
    restart: unless-stopped
    depends_on:
      - elasticsearch
    volumes:
      - ./elk/logstash/pipeline:/usr/share/logstash/pipeline:ro
      - /var/log/suricata:/var/log/suricata:ro
    networks:
      rm_net:
        ipv4_address: 10.10.20.12
    ports:
      - "5044:5044"

volumes:
  esdata:

networks:
  ot_hmi_net:
    driver: bridge
    ipam:
      config:
        - subnet: 10.10.10.0/24

  rm_net:
    driver: bridge
    ipam:
      config:
        - subnet: 10.10.20.0/24

