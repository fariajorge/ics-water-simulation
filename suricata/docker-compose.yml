version: "3.8"

services:
  suricata:
    image: jasonish/suricata:latest          # Suricata IDS/IPS image
    container_name: suricata
    network_mode: host                       # Use host network to see real traffic
    privileged: true                         # Required for promiscuous mode, etc.
    restart: unless-stopped                  # Auto-start on reboot or crash

    volumes:
      - ./suricata:/etc/suricata             # Custom Suricata config from repo
      - ./logs:/var/log/suricata             # Persistent logs on the host

    # Change interface if necessary
    command: >
      -i enp0s3
      -c /etc/suricata/suricata.yaml
